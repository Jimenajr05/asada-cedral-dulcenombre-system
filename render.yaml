services:
  - type: web
    name: asada-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_VERSION
        value: 20.18.3

      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: FRONTEND_URL
        value: https://asadacedraldulcenombre.com

  - type: static
    name: asada-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: NODE_VERSION
        value: 20.18.3

      - key: VITE_API_URL
        value: https://asada-backend-ww5l.onrender.com

    routes:
      - type: rewrite
        source: /*
        destination: /index.html