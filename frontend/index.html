<!doctype html>
<html lang="es">

<head>
  <!-- Metadatos de configuración técnica y accesibilidad -->
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/src/assets/Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="ASADA Cedral y Dulce Nombre - Gestión responsable del agua potable para nuestra comunidad" />

  <!-- Open Graph y Metadatos para motores de búsqueda -->
  <meta property="og:site_name" content="ASADA Cedral - Dulce Nombre" />
  <meta property="og:title" content="ASADA Cedral - Dulce Nombre" />
  <meta property="og:description" content="Gestión responsable del agua potable para nuestra comunidad." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://asadacedraldulcenombre.com/" />

  <!-- Datos estructurados JSON-LD para el nombre del sitio en Google Search -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ASADA Cedral - Dulce Nombre",
    "alternateName": ["ASADA Cedral y Dulce Nombre"],
    "url": "https://asadacedraldulcenombre.com/"
  }
  </script>

  <!-- Preconectar tipografías externas desde Google Fonts (Inter y Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title>ASADA Cedral y Dulce Nombre</title>
</head>

<body>
  <!-- Contenedor raíz donde se monta la aplicación React -->
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
